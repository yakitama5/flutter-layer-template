name: "Setup Application Runtime"
description: "Setup application runtime for Flutter"

runs:
  using: "composite"
  steps:

    - name: ⚙️Setup mise
      uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
      with:
        cache: true

    # NOTE: 後述の melosコマンドが実行できないためPATHを通します。
    # PUB_CACHE: $HOME/.pub-cache に設定
    - name: ⚙️Export PUB_CACHE
      run: |
        echo "PUB_CACHE=$HOME/.pub-cache" >> "$GITHUB_ENV"
        echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      shell: bash

    # NOTE: jdx/mise-action の cache は mise がインストールするツール本体(Flutter SDK等)のみが対象で
    # pub パッケージキャッシュ($PUB_CACHE)は対象外のため、pubspec.lock をキーに別途キャッシュする。
    - name: 📦Cache pub packages
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: 🏃‍➡️Setup melos
      run: |
        MELOS_VERSION=$(cat pubspec.lock | yq ".packages.melos.version" -r)
        dart pub global activate melos $MELOS_VERSION
        # NOTE: ルートはFlutter SDKを要求するpub workspaceのため、`.dart_tool`が
        # 未生成の状態で`dart run`を呼ぶと`dart pub`による暗黙のpub getが走り
        # 解決に失敗する。先に`flutter pub get`でworkspace解決を済ませておく。
        flutter pub get
        dart run melos bootstrap
      shell: bash

    - name: 🔥Setup FlutterFire
      run: |
        dart pub global activate flutterfire_cli
      shell: bash
    
    - name: ♻️Regenerate Code
      run: melos run gen
      shell: bash
