# ワークフローの表示名
name: Flutter Analyze

# ワークフローの起動条件を定義する
on:
  # プルリクエストが作成 or 更新された時
  pull_request:
    types:
      - opened
      - synchronize

  # main ブランチに push された時
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# 複数のジョブを定義する
# 各ジョブはそれぞれまったく別々の環境で実行される
jobs:
  flutter_analyze:
    # ジョブの表示名
    name: 🔬Analyze

    # ジョブを実行するOS
    runs-on: ubuntu-latest

    # タイムアウト時間（分）
    timeout-minutes: 15

    # ジョブの手順
    steps:
      # チェックアウト
      - name: 💾Checkout
        uses: actions/checkout@v4

      # セットアップ
      - name: ⚙️Setup Application Runtime
        uses: ./.github/actions/setup-application-runtime

      # 静的解析を実行
      - name: 🔬Analyze
        run: dart analyze
