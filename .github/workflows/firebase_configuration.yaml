name: Firebase Configuration

on:
  pull_request:
    paths:
      - firebase/**
      - firebase.json
      - .github/workflows/firebase_configuration.yaml
  push:
    branches: [main]
    paths:
      - firebase/**
      - firebase.json
      - .github/workflows/firebase_configuration.yaml
  workflow_dispatch:
    inputs:
      environment:
        description: Firebaseのデプロイ先
        required: true
        default: dev
        type: choice
        options: [dev, prd]

jobs:
  test:
    name: Test Firebase rules
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: firebase/package-lock.json
      - name: Install dependencies
        working-directory: firebase
        run: npm ci
      - name: Test rules with Firebase Emulator Suite
        run: >-
          npx --yes firebase-tools@15.23.0 emulators:exec
          --only firestore,storage
          --project demo-flutter-layer-template
          "npm --prefix firebase test"

  deploy:
    name: Deploy to ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate deployment settings
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: test -n "$FIREBASE_PROJECT_ID"
      - name: Deploy Firebase configuration
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: >-
          npx --yes firebase-tools@15.23.0 deploy
          --only firestore,storage,remoteconfig
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive
          --force
