name: Firebase Configuration

on:
  pull_request:
    paths:
      - firebase/**
      - firebase.json
      - .github/workflows/firebase_configuration.yaml
  push:
    branches: [main]
    paths:
      - firebase/**
      - firebase.json
      - .github/workflows/firebase_configuration.yaml
  workflow_dispatch:
    inputs:
      environment:
        description: Firebaseのデプロイ先
        required: true
        default: dev
        type: choice
        options: [dev, prd]

permissions:
  contents: read

# NOTE: workflow_dispatch経由のdeployジョブを途中キャンセルすると本番デプロイが中途半端な状態になりうるため、
# イベント種別ごとにグループを分け、PRの再push等では最新実行のみを残すが、
# workflow_dispatch(デプロイ)はキャンセルしない。
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  test:
    name: Test Firebase rules
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: firebase/package-lock.json
      - name: Install dependencies
        working-directory: firebase
        run: npm ci
      - name: Test rules with Firebase Emulator Suite
        run: >-
          npx --yes firebase-tools@15.23.0 emulators:exec
          --only firestore,storage
          --project demo-flutter-layer-template
          "npm --prefix firebase test"

  deploy:
    name: Deploy to ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - name: Validate deployment settings
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: test -n "$FIREBASE_PROJECT_ID"
      - name: Deploy Firebase configuration
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: >-
          npx --yes firebase-tools@15.23.0 deploy
          --only firestore,storage,remoteconfig
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive
          --force
