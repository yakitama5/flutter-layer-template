name: designsystem
description: "This package provides style definitions, themes, etc."
publish_to: "none"
version: 0.0.1

environment:
  sdk: ^3.12.2
  flutter: ^3.44.6

dependencies:
  packages_application:
    path: ../application
  adaptive_dialog: ^2.4.0
  animations: null
  collection: null
  domain:
    path: ../domain
  dynamic_color: null
  flutter:
    sdk: flutter
  flutter_hooks: null
  flutter_svg: null
  freezed_annotation: null
  gap: null
  gauge_indicator: 0.4.3
  hooks_riverpod: ^3.3.2
  linked_scroll_controller: null
  material_color_utilities: null
  nested: null
  responsive_framework: ^1.5.1
  riverpod: ^3.2.1
  shimmer: null
  slang: ^4.18.0
  slang_flutter: ^4.18.0
  sliver_tools: null
  store_redirect: ^2.0.3
  theme_tailor_annotation: null
  url_launcher: null

dev_dependencies:
  alchemist: ^0.14.0
  build_runner: ^2.15.1

  flutter_gen_runner: null
  flutter_test:
    sdk: flutter
  freezed: any


  theme_tailor: null

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_gen:
  output: lib/src/gen/assets
  integrations:
    flutter_svg: true
  assets:
    outputs:
      package_parameter_enabled: true

resolution: workspace
