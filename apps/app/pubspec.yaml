name: flutter_app
description: "A new Flutter project."
publish_to: "none"
version: 0.0.1

environment:
  sdk: ^3.12.2
  flutter: ^3.44.6

dependencies:
  adaptive_dialog: ^2.4.0
  animated_to: ^0.8.1
  cupertino_icons: null
  dependency_override:
    path: ../../packages/dependency_override
  designsystem:
    path: ../../packages/designsystem
  device_preview: ^1.2.0
  domain:
    path: ../../packages/domain
  dynamic_color: ^1.7.0
  flutter:
    sdk: flutter
  flutter_hooks: any
  flutter_localizations:
    sdk: flutter
  flutter_settings_ui: ^3.0.1
  freezed_annotation: any
  gap: any
  go_router: ^17.0.1
  hooks_riverpod: ^3.3.1
  intl: any
  json_annotation: ^4.11.0
  nested: null
  package_info_plus: ^10.2.0
  riverpod_annotation: ^4.0.2
  settings_ui: ^3.0.1
  slang: ^4.18.0
  slang_flutter: ^4.18.0
  version: null

dev_dependencies:
  build_runner: ^2.15.1
  build_verify: ^3.1.0
  flutter_gen: ^5.8.0
  flutter_gen_runner: any
  flutter_test:
    sdk: flutter
  freezed: any
  go_router_builder: ^4.1.3
  icons_launcher: any
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

  # Assets & Fonts
  assets:
    - assets/images/

flutter_gen:
  output: lib/src/gen/assets
  assets:
    outputs:
      package_parameter_enabled: false

resolution: workspace
