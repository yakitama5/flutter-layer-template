name: flutter_app
description: "A new Flutter project."
publish_to: "none"
version: 0.0.1

environment:
  sdk: ^3.12.2
  flutter: ^3.44.6

dependencies:
  packages_application:
    path: ../../packages/application
  adaptive_dialog: ^2.4.0
  cupertino_icons: null
  dependency_override:
    path: ../../packages/dependency_override
  designsystem:
    path: ../../packages/designsystem
  device_preview: ^1.2.0
  domain:
    path: ../../packages/domain
  flutter:
    sdk: flutter
  flutter_hooks: any
  flutter_localizations:
    sdk: flutter
  flutter_settings_ui: ^3.0.1
  gap: any
  go_router: ^17.0.1
  hooks_riverpod: ^3.3.1
  intl: any
  nested: null
  riverpod: ^3.2.1
  package_info_plus: ^10.2.0
  slang: ^4.18.0
  slang_flutter: ^4.18.0
  version: null

dev_dependencies:
  build_runner: ^2.15.1
  flutter_gen: ^5.8.0
  flutter_gen_runner: any
  flutter_test:
    sdk: flutter
  infrastructure_mock:
    path: ../../packages/infrastructure/mock
  integration_test:
    sdk: flutter
  freezed: any
  go_router_builder: ^4.1.3
  icons_launcher: any
  json_serializable: ^6.14.0
  patrol: ^4.7.0

flutter:
  uses-material-design: true

  # Assets & Fonts
  assets:
    - assets/images/

flutter_gen:
  output: lib/src/gen/assets
  assets:
    outputs:
      package_parameter_enabled: false

patrol:
  app_name: dev-Template
  test_directory: integration_test
  android:
    package_name: com.yakuran.template.dev
  ios:
    bundle_id: com.yakuran.template.dev

resolution: workspace
