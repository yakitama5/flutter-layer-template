include: package:flutter_lints/flutter.yaml
linter:
  rules:
    - public_member_api_docs: false

analyzer:
  exclude:
    - "**/build/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gform.dart"
    - "**/firebase_options*.dart"
  errors:
    invalid_annotation_target: ignore
    todo: ignore
    hack: ignore
